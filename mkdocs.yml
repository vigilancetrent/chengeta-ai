    - ResponseCache: layers/response.md
    - EmbeddingCache: layers/embedding.md
    - RetrievalCache: layers/retrieval.md
    - ContextCache: layers/context.md
    - SemanticCache: layers/semantic.md
    - AdaptiveSemanticCache: layers/adaptive-semantic.md
    - StreamingResponseCache: layers/streaming-response.md
    - PromptCacheLayer: layers/prompt-cache.md
  - Middleware:
    - Overview: middleware/index.md
    - LLMMiddleware: middleware/llm.md
    - EmbeddingMiddleware: middleware/embedding.md
    - RetrieverMiddleware: middleware/retriever.md
  - Adapters:
    - Overview: adapters/index.md
    - OpenAI: adapters/openai.md
    - Anthropic: adapters/anthropic.md
    - Mistral: adapters/mistral.md
    - Gemini: adapters/gemini.md
    - LangChain: adapters/langchain.md
    - LangGraph: adapters/langgraph.md
    - AutoGen: adapters/autogen.md
    - CrewAI: adapters/crewai.md
    - Agno: adapters/agno.md
    - A2A: adapters/a2a.md
    - LlamaIndex: adapters/llamaindex.md
    - Google ADK: adapters/google-adk.md
    - OpenAI Agents: adapters/openai-agents.md
    - Claude Agent SDK: adapters/claude-agent.md
  - Cookbook:
    - Overview: cookbook/index.md
    - Core Recipes: cookbook/core.md
    - LangChain: cookbook/langchain.md
    - LangGraph: cookbook/langgraph.md
    - AutoGen: cookbook/autogen.md
    - CrewAI: cookbook/crewai.md
    - Agno: cookbook/agno.md
    - A2A: cookbook/a2a.md
