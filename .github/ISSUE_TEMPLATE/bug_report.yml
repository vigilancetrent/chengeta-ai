name: Bug Report
description: Report a bug or unexpected behavior in chengeta-ai
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: ["vigilancetrent"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: chengeta-ai version
      placeholder: "e.g. 0.2.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend in use
      options:
        - InMemoryBackend
        - DiskBackend
        - RedisBackend
        - TieredBackend
        - FAISSBackend
        - ChromaBackend
        - AsyncInMemoryBackend
        - Other / not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste the smallest code snippet that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the full traceback if applicable.
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, any relevant installed extras, framework versions.
      placeholder: |
        OS: Ubuntu 22.04
        Extras: chengeta-ai[langchain,redis]
        langchain-core: 0.2.x
        redis: 5.0.x
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest release of chengeta-ai
          required: false
