name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: ["vigilancetrent"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe your use case clearly so we can evaluate and prioritize.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this relate to?
      options:
        - New backend (Redis, Qdrant, Weaviate, Pinecone, etc.)
        - New adapter (framework integration)
        - New cache layer
        - Core engine (CacheManager, policies, invalidation)
        - Serialization / compression
        - Async support
        - CLI
        - Performance / benchmarks
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What's your use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see. Include a code sketch if helpful.
      render: python
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why is this better?
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am willing to submit a PR for this feature
          required: false
