name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pre-commit (lint + format + mypy)
        run: uv run pre-commit run --all-files
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'

      - name: Lint with ruff (other matrix legs)
        run: |
          uv run ruff check chengeta_ai/ tests/
          uv run ruff format --check chengeta_ai/ tests/
        if: "!(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12')"

      - name: Run tests
        run: uv run pytest --cov=chengeta_ai --cov-report=term-missing -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Verify wheel
        run: |
          uv run pip install dist/*.whl
          uv run python -c "import chengeta_ai; print(f'chengeta-ai {chengeta_ai.__version__} OK')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
