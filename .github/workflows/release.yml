name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v0.1.1, v1.0.0, etc.

permissions:
  contents: write   # needed to create GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "chengeta-ai ${{ github.ref_name }}"
          body: |
            ## Install

            ```bash
            pip install chengeta-ai==${{ github.ref_name }}
            ```

            Full install options: https://pypi.org/project/chengeta-ai/

            ## What's changed
            See [CHANGELOG.md](https://github.com/vigilancetrent/chengeta-ai/blob/main/CHANGELOG.md) for details.
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
