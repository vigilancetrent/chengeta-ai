<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-label="Chengeta AI — Persistent Memory for Intelligent Agents">
  <title>Chengeta AI — Persistent Memory for Intelligent Agents</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B140F"/>
      <stop offset="0.55" stop-color="#0E2419"/>
      <stop offset="1" stop-color="#0B140F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#1B7F5A" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#1B7F5A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3DBF86"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <pattern id="chev" width="40" height="22" patternUnits="userSpaceOnUse" patternTransform="translate(0 0)">
      <path d="M0 22 L20 4 L40 22" fill="none" stroke="#C9A227" stroke-width="1.4" stroke-opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#glow)"/>
  <rect x="0" y="446" width="1500" height="54" fill="url(#chev)"/>
  <rect x="0" y="0" width="1500" height="6" fill="url(#grad)"/>

  <!-- mark -->
  <g transform="translate(150 168) scale(2.6)">
    <path d="M32 32 C25 20 12 20 12 32 C12 44 25 44 32 32" fill="none" stroke="#3DBF86" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M32 32 C39 20 52 20 52 32 C52 44 39 44 32 32" fill="none" stroke="#0F5B3A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="26" y="26" width="12" height="12" rx="2.5" transform="rotate(45 32 32)" fill="#C9A227"/>
    <circle cx="32" cy="32" r="2.2" fill="#0B140F"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="360" y="245" font-family="'Plus Jakarta Sans','Inter','Segoe UI',sans-serif" font-size="96" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">Chengeta</tspan><tspan dx="22" fill="#C9A227">AI</tspan>
  </text>
  <text x="364" y="305" font-family="'Inter','Segoe UI',sans-serif" font-size="34" font-weight="500" letter-spacing="0.5" fill="#9DB3A6">
