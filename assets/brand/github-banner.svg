<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Chengeta AI — Memory Infrastructure for Agentic AI">
  <title>Chengeta AI — Memory Infrastructure for Agentic AI</title>
  <desc>GitHub social preview banner for the Chengeta AI project.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B140F"/>
      <stop offset="0.5" stop-color="#0E2419"/>
      <stop offset="1" stop-color="#0A120D"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#1B7F5A" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#1B7F5A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3DBF86"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <pattern id="chev2" width="44" height="24" patternUnits="userSpaceOnUse">
      <path d="M0 24 L22 4 L44 24" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-opacity="0.16"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg2)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>
  <rect x="0" y="580" width="1280" height="60" fill="url(#chev2)"/>
  <rect x="0" y="0" width="1280" height="7" fill="url(#grad2)"/>

  <!-- centered mark -->
  <g transform="translate(568 120) scale(2.3)">
    <path d="M32 32 C25 20 12 20 12 32 C12 44 25 44 32 32" fill="none" stroke="#3DBF86" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M32 32 C39 20 52 20 52 32 C52 44 39 44 32 32" fill="none" stroke="#0F5B3A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="26" y="26" width="12" height="12" rx="2.5" transform="rotate(45 32 32)" fill="#C9A227"/>
    <circle cx="32" cy="32" r="2.2" fill="#0B140F"/>
  </g>

  <text x="640" y="370" text-anchor="middle" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="92" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">Chengeta</tspan><tspan dx="20" fill="#C9A227">AI</tspan>
  </text>
  <text x="640" y="428" text-anchor="middle" font-family="'Inter',sans-serif" font-size="34" font-weight="600" fill="#EAF2EC">
    Memory Infrastructure for Agentic AI
  </text>
  <text x="640" y="478" text-anchor="middle" font-family="'Inter',sans-serif" font-size="24" font-weight="400" fill="#9DB3A6">
    Persistent, high-performance memory across frameworks, workflows &amp; environments
  </text>
  <text x="640" y="535" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="22" fill="#3DBF86">
    pip install chengeta-ai
  </text>
</svg>
